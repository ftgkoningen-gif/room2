<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Hunter — Supermarkt Prijsvergelijker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="stylesheet" href="pricehunter.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ph: {
              orange: '#FF7300',
              'orange-light': '#FFF3E8',
              green: '#2E7D32',
              'green-light': '#E8F5E9',
            }
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            mono: ['Space Mono', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="ph-header">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-ph-orange flex items-center justify-center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <span class="ph-logo text-xl">Price Hunter</span>
      </div>
      <div id="week-badge" class="ph-week-badge">---</div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">

    <!-- Status bar -->
    <div class="flex items-center justify-between mb-6">
      <h1 class="ph-section-title text-lg">Actuele prijzen</h1>
      <span id="last-updated" class="ph-timestamp"></span>
    </div>

    <!-- Product cards -->
    <div id="products-container" class="space-y-5">
      <!-- Loading skeletons -->
      <div class="ph-card p-5">
        <div class="ph-skeleton h-6 w-48 mb-4"></div>
        <div class="ph-skeleton h-16 w-full mb-3"></div>
        <div class="ph-skeleton h-10 w-full"></div>
      </div>
      <div class="ph-card p-5">
        <div class="ph-skeleton h-6 w-56 mb-4"></div>
        <div class="ph-skeleton h-16 w-full mb-3"></div>
        <div class="ph-skeleton h-10 w-full"></div>
      </div>
      <div class="ph-card p-5">
        <div class="ph-skeleton h-6 w-44 mb-4"></div>
        <div class="ph-skeleton h-16 w-full mb-3"></div>
        <div class="ph-skeleton h-10 w-full"></div>
      </div>
    </div>

    <!-- Price trends -->
    <div class="mt-12 mb-6 flex items-center justify-between">
      <h2 class="ph-section-title text-lg">Prijsontwikkeling</h2>
      <div class="flex items-center gap-4 text-xs">
        <span class="flex items-center gap-1.5"><span class="ph-supermarket-dot ph-dot-ah"></span>Albert Heijn</span>
        <span class="flex items-center gap-1.5"><span class="ph-supermarket-dot ph-dot-jumbo"></span>Jumbo</span>
        <span class="flex items-center gap-1.5"><span class="ph-supermarket-dot ph-dot-dirk"></span>Dirk</span>
      </div>
    </div>

    <div id="charts-container" class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <!-- Charts rendered by JS -->
    </div>

    <!-- Footer -->
    <footer class="mt-16 pb-8 text-center">
      <p class="text-xs text-gray-400">
        Bronnen: Albert Heijn API, Jumbo API, Dirk API<br>
        Bij 1+1 / 2e gratis: effectieve prijs = gemiddelde stuksprijs
      </p>
    </footer>
  </main>

  <script>
    // ============================================================
    // CONFIG — vul hier je Supabase project URL en anon key in
    // ============================================================
    const SUPABASE_URL = 'https://mvwsloxbrzzjeamakfzg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12d3Nsb3hicnp6amVhbWFrZnpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTQxNjAsImV4cCI6MjA4Nzk3MDE2MH0.98WKwNtkUsjBncuoPtsWTINOHh1KYvjkKY33zrf5MZc';

    const SUPERMARKET_COLORS = {
      'Albert Heijn': { bg: '#00A0E2', line: '#00A0E2', dot: 'ph-dot-ah' },
      'Jumbo':        { bg: '#E8A800', line: '#C49000', dot: 'ph-dot-jumbo' },
      'Dirk':         { bg: '#E53935', line: '#E53935', dot: 'ph-dot-dirk' },
    };

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================================
    // DATA FETCHING
    // ============================================================

    async function fetchLatestWeek() {
      const { data, error } = await db
        .from('price_checks')
        .select('*')
        .order('year', { ascending: false })
        .order('week_number', { ascending: false })
        .limit(50);

      if (error) { console.error('Supabase error:', error); return []; }
      if (!data || data.length === 0) return [];

      // Find the latest week
      const latestYear = data[0].year;
      const latestWeek = data[0].week_number;
      return data.filter(d => d.year === latestYear && d.week_number === latestWeek);
    }

    async function fetchHistory() {
      const { data, error } = await db
        .from('price_checks')
        .select('week_number, year, product_name, supermarket, effective_price, is_on_sale, discount_label')
        .order('year', { ascending: true })
        .order('week_number', { ascending: true });

      if (error) { console.error('Supabase error:', error); return []; }
      return data || [];
    }

    // ============================================================
    // RENDER: Current Week
    // ============================================================

    function renderCurrentWeek(records) {
      const container = document.getElementById('products-container');

      if (records.length === 0) {
        container.innerHTML = `
          <div class="ph-empty">
            <svg class="mx-auto mb-3 text-gray-300" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <p class="text-sm font-medium mb-1">Nog geen data</p>
            <p class="text-xs">Prijzen verschijnen na de eerste wekelijkse check.</p>
          </div>`;
        return;
      }

      // Update week badge
      const wk = records[0];
      document.getElementById('week-badge').textContent = `Week ${wk.week_number} · ${wk.year}`;
      document.getElementById('last-updated').textContent = `Laatste update: ${new Date(wk.checked_at).toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' })}`;

      // Group by product
      const byProduct = {};
      for (const r of records) {
        if (!byProduct[r.product_name]) byProduct[r.product_name] = [];
        byProduct[r.product_name].push(r);
      }

      let html = '';
      let i = 0;
      for (const [productName, offers] of Object.entries(byProduct)) {
        offers.sort((a, b) => a.effective_price - b.effective_price);
        const cheapest = offers[0];

        html += `<div class="ph-card ph-fade-in" style="animation-delay: ${i * 80}ms">`;

        // Product header
        html += `<div class="px-5 pt-5 pb-3">
          <h3 class="font-semibold text-base text-gray-800">${productName}</h3>
        </div>`;

        // Cheapest highlight
        html += `<div class="mx-4 mb-3 ph-cheapest">
          <div class="flex items-center justify-between">
            <div>
              <span class="text-xs font-bold text-green-800 uppercase tracking-wide">Goedkoopst</span>
              <div class="flex items-center gap-2 mt-1">
                <span class="ph-supermarket-dot ${SUPERMARKET_COLORS[cheapest.supermarket]?.dot || ''}"></span>
                ${cheapest.product_url
                  ? `<a href="${cheapest.product_url}" target="_blank" class="ph-supermarket-link font-medium">${cheapest.supermarket}</a>`
                  : `<span class="font-medium">${cheapest.supermarket}</span>`
                }
              </div>
            </div>
            <div class="text-right">
              <span class="ph-price text-green-800">&euro;${Number(cheapest.effective_price).toFixed(2)}</span>
              ${cheapest.is_on_sale ? `<div class="ph-sale-tag mt-1">${cheapest.discount_label || 'Actie'}</div>` : ''}
            </div>
          </div>
          ${cheapest.discount_period ? `<div class="text-xs text-green-700 mt-1.5 opacity-80">Looptijd: ${cheapest.discount_period}</div>` : ''}
        </div>`;

        // Other supermarket prices
        const others = offers.slice(1);
        if (others.length > 0) {
          html += `<div class="px-5 pb-4">`;
          for (const o of others) {
            html += `<div class="ph-price-row">
              <div class="flex items-center gap-2">
                <span class="ph-supermarket-dot ${SUPERMARKET_COLORS[o.supermarket]?.dot || ''}"></span>
                ${o.product_url
                  ? `<a href="${o.product_url}" target="_blank" class="ph-supermarket-link text-sm">${o.supermarket}</a>`
                  : `<span class="text-sm">${o.supermarket}</span>`
                }
              </div>
              <div class="flex items-center gap-2">
                <span class="ph-price text-gray-700">&euro;${Number(o.effective_price).toFixed(2)}</span>
                ${o.is_on_sale ? `<span class="ph-sale-tag">${o.discount_label || 'Actie'}</span>` : ''}
              </div>
            </div>`;
          }
          html += `</div>`;
        }

        html += `</div>`;
        i++;
      }

      container.innerHTML = html;
    }

    // ============================================================
    // RENDER: Charts
    // ============================================================

    function renderCharts(history) {
      const container = document.getElementById('charts-container');

      if (history.length === 0) {
        container.innerHTML = `
          <div class="ph-empty col-span-full">
            <p class="text-sm">Grafieken verschijnen zodra er meerdere weken aan data zijn.</p>
          </div>`;
        return;
      }

      // Group by product
      const byProduct = {};
      for (const r of history) {
        if (!byProduct[r.product_name]) byProduct[r.product_name] = [];
        byProduct[r.product_name].push(r);
      }

      let html = '';
      let i = 0;
      for (const productName of Object.keys(byProduct)) {
        html += `<div class="ph-card p-5 ph-fade-in" style="animation-delay: ${200 + i * 100}ms">
          <h4 class="font-semibold text-sm text-gray-700 mb-3">${productName}</h4>
          <div class="ph-chart-container">
            <canvas id="chart-${i}"></canvas>
          </div>
        </div>`;
        i++;
      }
      container.innerHTML = html;

      // Render Chart.js charts
      i = 0;
      for (const [productName, records] of Object.entries(byProduct)) {
        const canvas = document.getElementById(`chart-${i}`);
        if (!canvas) { i++; continue; }

        // Build labels (week numbers) and datasets per supermarket
        const weekLabels = [...new Set(records.map(r => `W${r.week_number}`))];
        const bySupermarket = {};
        for (const r of records) {
          if (!bySupermarket[r.supermarket]) bySupermarket[r.supermarket] = {};
          bySupermarket[r.supermarket][`W${r.week_number}`] = Number(r.effective_price);
        }

        const datasets = Object.entries(bySupermarket).map(([name, weekData]) => {
          const colors = SUPERMARKET_COLORS[name] || { line: '#999', bg: '#999' };
          return {
            label: name,
            data: weekLabels.map(w => weekData[w] ?? null),
            borderColor: colors.line,
            backgroundColor: colors.line + '18',
            borderWidth: 2,
            pointRadius: 4,
            pointHoverRadius: 6,
            pointBackgroundColor: 'white',
            pointBorderColor: colors.line,
            pointBorderWidth: 2,
            tension: 0.3,
            fill: false,
            spanGaps: true,
          };
        });

        new Chart(canvas, {
          type: 'line',
          data: { labels: weekLabels, datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: 'white',
                titleColor: '#212121',
                bodyColor: '#616161',
                borderColor: '#E0E0E0',
                borderWidth: 1,
                padding: 10,
                cornerRadius: 8,
                titleFont: { family: 'Space Mono', weight: '700', size: 12 },
                bodyFont: { family: 'DM Sans', size: 12 },
                callbacks: {
                  label: (ctx) => {
                    const val = ctx.parsed.y;
                    if (val === null) return null;
                    const rec = records.find(r =>
                      `W${r.week_number}` === ctx.label && r.supermarket === ctx.dataset.label
                    );
                    let label = `${ctx.dataset.label}: €${val.toFixed(2)}`;
                    if (rec?.is_on_sale && rec?.discount_label) label += ` (${rec.discount_label})`;
                    return label;
                  }
                }
              }
            },
            scales: {
              x: {
                grid: { display: false },
                ticks: {
                  font: { family: 'Space Mono', size: 11 },
                  color: '#9E9E9E',
                },
                border: { display: false },
              },
              y: {
                grid: { color: '#F5F5F5' },
                ticks: {
                  font: { family: 'Space Mono', size: 11 },
                  color: '#9E9E9E',
                  callback: (v) => `€${v.toFixed(2)}`,
                },
                border: { display: false },
                beginAtZero: false,
              }
            }
          }
        });

        i++;
      }
    }

    // ============================================================
    // INIT
    // ============================================================

    async function init() {
      try {
        const [currentWeek, history] = await Promise.all([
          fetchLatestWeek(),
          fetchHistory(),
        ]);
        renderCurrentWeek(currentWeek);
        renderCharts(history);
      } catch (err) {
        console.error('Init failed:', err);
        document.getElementById('products-container').innerHTML = `
          <div class="ph-empty">
            <p class="text-sm font-medium text-red-500 mb-1">Kon data niet laden</p>
            <p class="text-xs text-gray-400">Controleer de Supabase configuratie.</p>
          </div>`;
      }
    }

    init();
  </script>
</body>
</html>
